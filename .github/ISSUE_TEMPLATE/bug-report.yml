name: Bug Report
description: File a bug report to help us improve
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of the software are you using?
      options:
        - v1.0.0
        - v2.0.0
        - Beta
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Reproducibility
      options:
        - label: I have verified this bug exists on the latest version.
          required: true
